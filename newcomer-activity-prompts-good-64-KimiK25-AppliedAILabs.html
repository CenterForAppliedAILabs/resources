    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        mountain: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        sunset: {
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                        }
                    }
                }
            }
        }

        // Dark mode initialization
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%);
        }
        .dark body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .prompt-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .prompt-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .dark .prompt-card:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }
        .copy-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .prompt-row:hover .copy-btn {
            opacity: 1;
        }
        @media (max-width: 768px) {
            .copy-btn {
                opacity: 1;
            }
        }
        .toast {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .category-pill.active {
            background: linear-gradient(135deg, #0284c7 0%, #0c4a6e 100%);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.3);
        }
        .dark .category-pill.active {

        .gradient-text {
            background: linear-gradient(135deg, #0284c7 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

                description: 'Exploring varietals and restaurant experiences',
                prompts: [
                    { text: "Create a wine tasting note template for beginners with vocabulary that describes flavors without being intimidating or pretentious.", useCase: "Education" },
                    { text: "Suggest approachable wine varietals for a first-time Wine Tasting group and provide conversation starters about each selection.", useCase: "Curated Selection" },
                    { text: "Draft a restaurant rotation schedule for Supper Club that includes a mix of Park City Main Street, Kimball Junction, and Heber locations with varying price points.", useCase: "Rotation Planning" },
                    { text: "Create guidelines for splitting bills fairly at Supper Club while accommodating those who may only want appetizers or non-alcoholic drinks.", useCase: "Financial Etiquette" }
                ]
            }
        ];

        let currentCategory = 'all';
        let searchTerm = '';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateCounts();
            renderPrompts();
            
            // Search functionality
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchTerm = e.target.value.toLowerCase();
                renderPrompts();
            });

            // Theme toggle functionality
            const themeToggleBtn = document.getElementById('themeToggle');
            themeToggleBtn.addEventListener('click', function() {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            });
        });

        function updateCounts() {
            const categories = ['all', 'games', 'outdoor', 'creative', 'dining'];
            categories.forEach(cat => {
                const count = cat === 'all' ? promptData.length : promptData.filter(item => item.category === cat).length;
                const el = document.getElementById(`count-${cat}`);
                if (el) el.textContent = count;
            });
        }

        function filterCategory(category) {
            currentCategory = category;
            
            // Update UI
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            renderPrompts();
        }

        function renderPrompts() {
            const container = document.getElementById('promptsContainer');
            const emptyState = document.getElementById('emptyState');
            
            // Filter data
            let filtered = promptData;
            
            if (currentCategory !== 'all') {
                filtered = filtered.filter(item => item.category === currentCategory);
            }
            
            if (searchTerm) {
                filtered = filtered.filter(item => {
                    const inActivity = item.activity.toLowerCase().includes(searchTerm);
                    const inDescription = item.description.toLowerCase().includes(searchTerm);
                    const inPrompts = item.prompts.some(p => 
                        p.text.toLowerCase().includes(searchTerm) || 
                        p.useCase.toLowerCase().includes(searchTerm)
                    );
                    return inActivity || inDescription || inPrompts;
                });
            }

            // Update search stats
            const statsEl = document.getElementById('searchStats');
            if (searchTerm && filtered.length > 0) {
                statsEl.textContent = `${filtered.length} found`;
                statsEl.classList.remove('hidden');
            } else {
                statsEl.classList.add('hidden');
            }

            // Render
            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            container.innerHTML = filtered.map((item, index) => `
                <div class="prompt-card bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden flex flex-col transition-all duration-300" style="animation: fadeIn 0.5s ease-out ${index * 0.05}s forwards; opacity: 0;">
                    <div class="p-6 border-b border-gray-100 dark:border-slate-700 bg-gradient-to-r from-gray-50 to-white dark:from-slate-800 dark:to-slate-800/50">
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 ${item.bgColor} dark:bg-opacity-20 ${item.color} rounded-xl flex items-center justify-center text-lg shadow-sm">
                                    <i class="fa-solid ${item.icon}"></i>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold text-gray-900 dark:text-white">${item.activity}</h3>
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${item.bgColor} dark:bg-opacity-20 ${item.color}">
                                        ${getCategoryName(item.category)}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <p class="text-sm text-gray-600 dark:text-gray-400 mt-2">${item.description}</p>
                    </div>
                    
                    <div class="flex-1 p-4 space-y-3">
                        ${item.prompts.map((prompt, idx) => `
                            <div class="prompt-row group relative bg-gray-50 dark:bg-slate-900/40 rounded-xl p-4 border border-gray-100 dark:border-slate-700/50 hover:border-mountain-200 dark:hover:border-mountain-700 hover:bg-mountain-50/30 dark:hover:bg-mountain-900/20 transition-all cursor-pointer" onclick="copyPrompt('${escapeHtml(prompt.text)}')">
                                <div class="flex items-start justify-between gap-3">
                                    <div class="flex-1">
                                        <div class="text-xs font-semibold text-sunset-500 mb-1 uppercase tracking-wide">${prompt.useCase}</div>
                                        <p class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed line-clamp-3 group-hover:line-clamp-none transition-all">${prompt.text}</p>
                                    </div>
                                    <button class="copy-btn flex-shrink-0 w-8 h-8 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg shadow-sm flex items-center justify-center text-gray-400 hover:text-mountain-600 hover:border-mountain-300 transition-all" onclick="event.stopPropagation(); copyPrompt('${escapeHtml(prompt.text)}')" title="Copy to clipboard">
                                        <i class="fa-regular fa-copy"></i>
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="px-6 py-3 bg-gray-50 dark:bg-slate-800/50 border-t border-gray-100 dark:border-slate-700 text-xs text-gray-500 dark:text-gray-400 flex justify-between items-center">
                        <span>${item.prompts.length} prompts available</span>
                        <span class="flex items-center gap-1"><i class="fa-solid fa-bolt text-yellow-500"></i> AI Ready</span>
                    </div>
                </div>
            `).join('');
            
            // Add fade-in animation
            const style = document.createElement('style');
            style.textContent = `
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
            `;
            document.head.appendChild(style);
        }

        function getCategoryName(cat) {
            const names = {
                'games': 'Games & Strategy',
                'outdoor': 'Outdoor & Adventure',
                'creative': 'Creative & Social',
                'dining': 'Dining & Food'
            };
            return names[cat] || cat;
        }

        function escapeHtml(text) {
            return text.replace(/'/g, "\\'");
        }

        async function copyPrompt(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast('Prompt copied to clipboard!', 'success');
            } catch (err) {
                // Fallback for older browsers
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand("Copy");
                textArea.remove();
                showToast('Prompt copied to clipboard!', 'success');
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast pointer-events-auto bg-gray-900 dark:bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center space-x-3 min-w-[300px] border dark:border-slate-700 transition-all`;
            toast.innerHTML = `
                <i class="fa-solid fa-check-circle text-green-400"></i>
                <div>
                    <p class="font-medium text-sm">${message}</p>
                </div>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
